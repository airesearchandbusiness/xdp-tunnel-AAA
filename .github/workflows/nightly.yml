# Tachyon XDP Tunnel - Nightly Extended Tests
#
# Runs fuzz testing, extended sanitizer scan, integration tests, and benchmarks.
# Triggered: Daily at 03:00 UTC, or manual dispatch.

name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: 'Fuzz test duration per harness (seconds)'
        required: false
        default: '1800'
      run_benchmarks:
        description: 'Run performance benchmarks'
        required: false
        default: 'true'

permissions:
  contents: write   # benchmark-action pushes baselines to gh-pages

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive
  FUZZ_DURATION: ${{ github.event.inputs.fuzz_duration || '1800' }}

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Build (reused across all nightly jobs)
  # ════════════════════════════════════════════════════════════════════════

  build:
    name: "build"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps
        with:
          packages: 'build-essential clang-18 llvm-18 libbpf-dev libelf-dev libssl-dev linux-headers-generic cmake ninja-build pkg-config libgtest-dev libgmock-dev'
          cache-key-file: '.github/workflows/nightly.yml'

      - name: Build all targets
        run: |
          make xdp
          make loader
          cmake -B build -S tests \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_FUZZ_TESTS=ON \
            -DBUILD_XDP_TESTS=ON \
            -G Ninja
          cmake --build build -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v8
        with:
          name: nightly-build
          path: |
            loader/tachyon
            src/xdp_core.o
            build/
          retention-days: 3

  # ════════════════════════════════════════════════════════════════════════
  # Fuzz Testing
  # ════════════════════════════════════════════════════════════════════════

  fuzz-config:
    name: "fuzz / config-parser"
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps
        with:
          packages: 'libbpf-dev libssl-dev'
          cache-key-file: '.github/workflows/nightly.yml'

      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: nightly-build

      - name: Fix permissions
        run: chmod +x build/fuzz_config_parser 2>/dev/null || true

      - name: Run config parser fuzzer
        run: |
          if [[ -x build/fuzz_config_parser ]]; then
            mkdir -p fuzz_corpus_config fuzz_artifacts
            cp tests/fuzz/corpus/config/* fuzz_corpus_config/ 2>/dev/null || true
            build/fuzz_config_parser fuzz_corpus_config/ \
              -max_total_time=${{ env.FUZZ_DURATION }} \
              -artifact_prefix=fuzz_artifacts/ \
              -print_final_stats=1 \
              2>&1 | tail -50
          else
            echo "Fuzzer not built, skipping"
          fi

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v8
        with:
          name: fuzz-crashes-config
          path: fuzz_artifacts/
          if-no-files-found: ignore

  fuzz-crypto:
    name: "fuzz / crypto"
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps
        with:
          packages: 'libbpf-dev libssl-dev'
          cache-key-file: '.github/workflows/nightly.yml'

      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: nightly-build

      - name: Fix permissions
        run: chmod +x build/fuzz_crypto 2>/dev/null || true

      - name: Run crypto fuzzer
        run: |
          if [[ -x build/fuzz_crypto ]]; then
            mkdir -p fuzz_corpus_crypto fuzz_artifacts
            build/fuzz_crypto fuzz_corpus_crypto/ \
              -max_total_time=${{ env.FUZZ_DURATION }} \
              -artifact_prefix=fuzz_artifacts/ \
              -print_final_stats=1 \
              2>&1 | tail -50
          else
            echo "Fuzzer not built, skipping"
          fi

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v8
        with:
          name: fuzz-crashes-crypto
          path: fuzz_artifacts/
          if-no-files-found: ignore

  # ════════════════════════════════════════════════════════════════════════
  # Extended Integration Tests
  # ════════════════════════════════════════════════════════════════════════

  integration-extended:
    name: "integration / extended"
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps
        with:
          packages: 'libbpf-dev libssl-dev libelf-dev iproute2 iputils-ping kmod iperf3 jq'
          cache-key-file: '.github/workflows/nightly.yml'

      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: nightly-build

      - name: Fix permissions
        run: chmod +x loader/tachyon tests/integration/*.sh

      - name: Load kernel module
        run: |
          if [[ -f kmod/mod.ko ]]; then
            sudo insmod kmod/mod.ko || echo "Module load failed"
          fi

      - name: Run E2E tunnel test
        run: sudo tests/integration/test_tunnel_e2e.sh || true

      - name: Run key rotation test
        run: sudo tests/integration/test_key_rotation.sh || true

      - name: Run dead peer detection test
        run: sudo tests/integration/test_dpd.sh || true

  # ════════════════════════════════════════════════════════════════════════
  # Performance Benchmarks
  # ════════════════════════════════════════════════════════════════════════

  benchmarks:
    name: "perf / benchmarks"
    runs-on: ubuntu-24.04
    if: ${{ github.event.inputs.run_benchmarks != 'false' }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps
        with:
          packages: 'build-essential cmake ninja-build pkg-config libssl-dev libgtest-dev libgmock-dev jq'
          cache-key-file: '.github/workflows/nightly.yml'

      - name: Build benchmarks
        run: |
          cmake -B build/bench -S tests \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_BENCHMARKS=ON \
            -DBUILD_XDP_TESTS=OFF \
            -DBUILD_FUZZ_TESTS=OFF \
            -G Ninja
          cmake --build build/bench --target bench_crypto -j$(nproc)

      - name: Run crypto benchmarks
        run: |
          build/bench/bench_crypto \
            --benchmark_format=json \
            --benchmark_out=benchmark_result.json \
            --benchmark_repetitions=3 \
            --benchmark_report_aggregates_only=true
          # Pretty-print summary to log
          jq '.benchmarks[] | "\(.name): \(.real_time | round) \(.time_unit)"' \
            benchmark_result.json

      - name: Annotate results to job summary
        run: |
          echo "## Crypto Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\`  " >> "$GITHUB_STEP_SUMMARY"
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Benchmark | Mean (µs) | CPU (µs) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.benchmarks[]
            | select(.aggregate_name == "mean" or .aggregate_name == null)
            | "| \(.name) | \(.real_time | . * 100 | round / 100) | \(.cpu_time | . * 100 | round / 100) |"' \
            benchmark_result.json >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v8
        with:
          name: benchmark-results
          path: benchmark_result.json

      - name: Store baseline & alert on regression
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Tachyon Crypto Benchmarks"
          tool: googlecpp
          output-file-path: benchmark_result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: docs/benchmarks
          comment-on-alert: true
          alert-threshold: '110%'
          fail-on-alert: false
          summary-always: true

  # ════════════════════════════════════════════════════════════════════════
  # Extended Sanitizer Run (ASan + UBSan — nightly deep scan)
  # ════════════════════════════════════════════════════════════════════════

  sanitize-extended:
    name: "sanitize / extended (ASan+UBSan)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps
        with:
          packages: 'clang-18 libssl-dev cmake ninja-build pkg-config libgtest-dev libgmock-dev'
          cache-key-file: '.github/workflows/nightly.yml'

      - name: Build with sanitizers
        run: |
          cmake -B build/san -S tests \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZE=ON \
            -DBUILD_XDP_TESTS=OFF \
            -DBUILD_FUZZ_TESTS=OFF \
            -G Ninja
          cmake --build build/san -j$(nproc)

      - name: Run extended sanitizer tests
        env:
          ASAN_OPTIONS: "halt_on_error=1:abort_on_error=1:detect_leaks=1:check_initialization_order=1:strict_init_order=1:detect_stack_use_after_return=1"
          UBSAN_OPTIONS: "halt_on_error=1:abort_on_error=1:print_stacktrace=1:report_error_type=1"
        run: |
          mkdir -p build/san/test-results
          cd build/san && ctest --output-on-failure --timeout 300 \
            --output-junit test-results/sanitize-nightly.xml

      - name: Upload sanitizer test results
        if: always()
        uses: actions/upload-artifact@v8
        with:
          name: sanitize-extended-results
          path: build/san/test-results/sanitize-nightly.xml
          if-no-files-found: ignore

  # ════════════════════════════════════════════════════════════════════════
  # Valgrind Memcheck (catches classes of bugs ASan misses)
  # ════════════════════════════════════════════════════════════════════════

  valgrind:
    name: "valgrind / memcheck"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps
        with:
          packages: 'valgrind libssl-dev cmake ninja-build pkg-config libgtest-dev libgmock-dev'
          cache-key-file: '.github/workflows/nightly.yml'

      - name: Build (no instrumentation — valgrind needs clean binary)
        run: |
          cmake -B build/valgrind -S tests \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_XDP_TESTS=OFF \
            -DBUILD_FUZZ_TESTS=OFF \
            -G Ninja
          cmake --build build/valgrind -j$(nproc)

      - name: Run under valgrind memcheck
        run: |
          mkdir -p build/valgrind/test-results
          cd build/valgrind

          # Run each test binary individually under valgrind
          for binary in test_config test_crypto test_nonce_cache test_utils test_protocol; do
            if [[ -x "./${binary}" ]]; then
              echo "=== valgrind: ${binary} ==="
              valgrind \
                --tool=memcheck \
                --error-exitcode=1 \
                --leak-check=full \
                --show-leak-kinds=definite,indirect \
                --track-origins=yes \
                --suppressions=../../tests/valgrind.supp \
                --xml=yes \
                --xml-file="test-results/valgrind-${binary}.xml" \
                "./${binary}" --gtest_filter=* 2>&1 | tail -20 || true
            fi
          done

      - name: Upload valgrind reports
        if: always()
        uses: actions/upload-artifact@v8
        with:
          name: valgrind-reports
          path: build/valgrind/test-results/
          if-no-files-found: ignore
