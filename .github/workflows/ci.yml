# Tachyon XDP Tunnel - Continuous Integration
#
# Stages: Lint -> Build -> Unit Tests -> Coverage -> Sanitize -> clang-tidy -> CodeQL
#
# Triggered on: push to main, pull requests against main

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Stage 1: Lint (fast-fail)
  # ════════════════════════════════════════════════════════════════════════

  lint:
    name: "lint"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read   # required by gitleaks-action
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: clang-format
        run: |
          find tests/ src/ loader/ \( -name '*.c' -o -name '*.cpp' -o -name '*.h' \) -print \
            | xargs clang-format --dry-run --Werror --style=file

      - name: shellcheck
        run: find tests/ -name '*.sh' -exec shellcheck -x -S warning {} +

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════════
  # Stage 2: Build
  # ════════════════════════════════════════════════════════════════════════

  build:
    name: "build"
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends libssl-dev libelf-dev

      - name: Build loader (advisory)
        run: make loader 2>&1 || echo "::warning::Loader build requires libbpf"

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/
          key: cmake-${{ runner.os }}-${{ hashFiles('tests/CMakeLists.txt', 'tests/**/*.cpp', 'tests/**/*.h') }}
          restore-keys: cmake-${{ runner.os }}-

      - name: Build test suite
        run: |
          cmake -B build -S tests \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_XDP_TESTS=OFF \
            -DBUILD_FUZZ_TESTS=OFF
          cmake --build build -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v8
        with:
          name: build-artifacts
          path: build/
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════
  # Stage 3: Unit Tests
  # ════════════════════════════════════════════════════════════════════════

  test:
    name: "test / unit"
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends libssl-dev

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: build/

      - name: Run unit tests
        run: |
          chmod +x build/test_* 2>/dev/null || true
          mkdir -p build/test-results
          cd build && ctest --output-on-failure --timeout 60 \
            --output-junit test-results/unit.xml

      - name: Write job summary
        if: always()
        run: |
          XML=build/test-results/unit.xml
          if [[ -f "$XML" ]]; then
            python3 - <<'PYEOF'
import xml.etree.ElementTree as ET, os
tree = ET.parse("build/test-results/unit.xml")
root = tree.getroot()
ts = root.find("testsuite") if root.tag == "testsuites" else root
tests    = int(ts.get("tests",    0))
failures = int(ts.get("failures", 0))
errors   = int(ts.get("errors",   0))
skipped  = int(ts.get("skipped",  0))
passed   = tests - failures - errors - skipped
status   = ":white_check_mark:" if failures + errors == 0 else ":x:"
with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
    f.write(f"## {status} Unit Test Results\n\n")
    f.write("| Metric  | Count |\n|---------|-------|\n")
    f.write(f"| Passed  | {passed} |\n")
    f.write(f"| Failed  | {failures + errors} |\n")
    f.write(f"| Skipped | {skipped} |\n")
    f.write(f"| **Total** | **{tests}** |\n")
PYEOF
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v8
        with:
          name: test-results-unit
          path: build/test-results/unit.xml
          if-no-files-found: ignore

  # ════════════════════════════════════════════════════════════════════════
  # Stage 4: Security Scanning
  # ════════════════════════════════════════════════════════════════════════

  security:
    name: "security / codeql"
    runs-on: ubuntu-24.04
    needs: lint
    continue-on-error: true
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends libbpf-dev libelf-dev libssl-dev zlib1g-dev

      - name: Build for analysis
        run: make loader 2>&1 || true

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"

  # ════════════════════════════════════════════════════════════════════════
  # Stage 5: Coverage Upload
  # ════════════════════════════════════════════════════════════════════════

  coverage:
    name: "coverage"
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libssl-dev lcov

      - name: Build with coverage instrumentation
        run: |
          cmake -B build/cov -S tests \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_COVERAGE=ON \
            -DBUILD_XDP_TESTS=OFF \
            -DBUILD_FUZZ_TESTS=OFF
          cmake --build build/cov -j$(nproc)

      - name: Run unit tests
        run: |
          mkdir -p build/cov/test-results
          cd build/cov && ctest --output-on-failure --timeout 60 \
            --output-junit test-results/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v8
        with:
          name: test-results-coverage
          path: build/cov/test-results/coverage.xml
          if-no-files-found: ignore

      - name: Collect coverage data
        run: |
          lcov --capture --directory build/cov \
            --output-file build/cov/coverage.info \
            --ignore-errors mismatch 2>/dev/null
          lcov --remove build/cov/coverage.info \
            '/usr/*' '*/tests/*' '*/googletest/*' \
            --output-file build/cov/coverage-filtered.info 2>/dev/null
          lcov --summary build/cov/coverage-filtered.info 2>/dev/null || true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/cov/coverage-filtered.info
          flags: unit
          fail_ci_if_error: false

  # ════════════════════════════════════════════════════════════════════════
  # Stage 6: Sanitizer Tests (ASan + UBSan)
  # ════════════════════════════════════════════════════════════════════════

  sanitize:
    name: "test / sanitize (ASan+UBSan)"
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            clang-18 libssl-dev

      - name: Build with sanitizers
        run: |
          cmake -B build/san -S tests \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZE=ON \
            -DBUILD_XDP_TESTS=OFF \
            -DBUILD_FUZZ_TESTS=OFF
          cmake --build build/san -j$(nproc)

      - name: Run tests under sanitizers
        env:
          ASAN_OPTIONS: "halt_on_error=1:abort_on_error=1:detect_leaks=1"
          UBSAN_OPTIONS: "halt_on_error=1:abort_on_error=1:print_stacktrace=1"
        run: |
          mkdir -p build/san/test-results
          cd build/san && ctest --output-on-failure --timeout 120 \
            --output-junit test-results/sanitize.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v8
        with:
          name: test-results-sanitize
          path: build/san/test-results/sanitize.xml
          if-no-files-found: ignore

  # ════════════════════════════════════════════════════════════════════════
  # Stage 7: Static Analysis (clang-tidy)
  # ════════════════════════════════════════════════════════════════════════

  analysis:
    name: "analysis / clang-tidy"
    runs-on: ubuntu-24.04
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            clang-18 clang-tidy-18 libssl-dev libelf-dev

      - name: Generate compilation database
        run: |
          cmake -B build/tidy -S tests \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_XDP_TESTS=OFF \
            -DBUILD_FUZZ_TESTS=OFF
          cmake --build build/tidy -j$(nproc)

      - name: Run clang-tidy
        run: |
          find loader/ -name '*.cpp' \
            | xargs clang-tidy-18 \
                -p build/tidy \
                --config-file=.clang-tidy \
                2>&1 | tee clang-tidy-report.txt
          if grep -q " error:" clang-tidy-report.txt; then
            echo "::error::clang-tidy found errors — see report above"
            exit 1
          fi
          echo "clang-tidy: no errors"

      - name: Upload clang-tidy report
        if: always()
        uses: actions/upload-artifact@v8
        with:
          name: clang-tidy-report
          path: clang-tidy-report.txt
          if-no-files-found: ignore
