# Tachyon XDP Tunnel - Continuous Integration Pipeline
#
# Stages: Lint -> Build -> Unit Test -> Security Scan
#
# Triggered on: push to main, pull requests

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Stage 1: Lint & Format (fast-fail, parallel)
  # ════════════════════════════════════════════════════════════════════════

  clang-format:
    name: "lint / clang-format"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          find tests/ \( -name '*.c' -o -name '*.cpp' -o -name '*.h' \) -print \
            | xargs clang-format --dry-run --Werror --style=file
          find src/ loader/ \( -name '*.c' -o -name '*.cpp' -o -name '*.h' \) -print \
            | xargs clang-format --dry-run --style=file || true

  shellcheck:
    name: "lint / shellcheck"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: find tests/ -name '*.sh' -exec shellcheck -x -S warning {} +

  lint-cpp:
    name: "lint / cppcheck"
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
            --suppress=missingInclude --suppress=unmatchedSuppression \
            --suppress=syntaxError --suppress=preprocessorErrorDirective \
            -I src/ -I loader/ --std=c++17 \
            loader/ src/common.h || true

  secrets-scan:
    name: "lint / secrets-detection"
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Scan for secrets
        run: |
          set +e
          # Try to install and run gitleaks; skip gracefully if unavailable
          GITLEAKS_URL="https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64"
          if curl -sSfL "$GITLEAKS_URL" -o /usr/local/bin/gitleaks 2>/dev/null; then
            chmod +x /usr/local/bin/gitleaks
            gitleaks detect --source=. --no-git --config=.gitleaks.toml || true
          else
            echo "::warning::gitleaks download failed, skipping secrets scan"
          fi

  # ════════════════════════════════════════════════════════════════════════
  # Stage 2: Build
  # ════════════════════════════════════════════════════════════════════════

  build:
    name: "build"
    runs-on: ubuntu-24.04
    needs: [clang-format, shellcheck]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libssl-dev libelf-dev

      - name: Build loader
        run: |
          make loader 2>&1 || {
            echo "::warning::Loader build failed - building test suite only"
          }

      - name: Configure test suite
        run: |
          cmake -B build -S tests \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_XDP_TESTS=OFF \
            -DBUILD_FUZZ_TESTS=OFF

      - name: Build test suite
        run: cmake --build build -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            loader/tachyon
            src/xdp_core.o
            build/
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════
  # Stage 3: Unit Tests
  # ════════════════════════════════════════════════════════════════════════

  unit-tests:
    name: "test / unit"
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libssl-dev

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts

      - name: Run unit tests
        run: |
          chmod +x build/test_* 2>/dev/null || true
          cd build && ctest --output-on-failure --timeout 60 \
            --exclude-regex 'xdp_test_runner'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/Testing/
          if-no-files-found: ignore

  # ════════════════════════════════════════════════════════════════════════
  # Stage 4: Security Scanning
  # ════════════════════════════════════════════════════════════════════════

  codeql:
    name: "security / codeql"
    runs-on: ubuntu-24.04
    continue-on-error: true
    needs: [clang-format]
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: security-and-quality

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libbpf-dev libelf-dev libssl-dev zlib1g-dev

      - name: Build for analysis
        run: make loader || echo "::warning::Loader build failed for CodeQL"

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"
