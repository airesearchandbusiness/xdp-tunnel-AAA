image:
  repository: ghcr.io/airesearchandbusiness/tachyon
  tag: "1.2.0"
  pullPolicy: IfNotPresent

config:
  # Required Interface fields (parser is case-sensitive PascalCase)
  listenPort: 443
  virtualIP: 10.8.0.1/24
  localPhysicalIP: 192.168.1.10
  physicalInterface: eth0

  # Required Peer fields
  peer:
    endpointIP: 192.168.1.20
    endpointMAC: aa:bb:cc:dd:ee:ff
    innerIP: 10.8.0.2

  # Optional knobs
  mimicryType: quic
  obfsFlags: 0x3F
  logFormat: json
  logLevel: info
  shutdownDrainSeconds: 10

secrets:
  # Hex-encoded; mounted as /run/secrets/* and resolved via TACHYON_*_KEY
  # env vars in container entrypoint.
  privateKey: ""
  peerPublicKey: ""
  psk: ""

resources:
  limits:
    cpu: 2000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 64Mi

metrics:
  enabled: true
  port: 9090
  serviceMonitor:
    enabled: false

probes:
  liveness:
    httpGet:
      path: /health
      port: metrics
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    httpGet:
      path: /ready
      port: metrics
    initialDelaySeconds: 10
    periodSeconds: 5

securityContext:
  capabilities:
    add:
      - NET_ADMIN
      - BPF
      - SYS_ADMIN

nodeSelector: {}
tolerations: []
