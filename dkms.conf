PACKAGE_NAME="tachyon-crypto"
PACKAGE_VERSION="1.0"

# مسیر build
BUILT_MODULE_NAME[0]="mod"
BUILT_MODULE_LOCATION[0]="kmod"
DEST_MODULE_LOCATION[0]="/updates"

# دستورات build
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kmod modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kmod clean"

# نصب خودکار
AUTOINSTALL="yes"